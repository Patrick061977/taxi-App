<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#2bbf48"/>
      <stop offset="100%" stop-color="#1a9a37"/>
    </linearGradient>
    <linearGradient id="taxi-body" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#F5B800"/>
    </linearGradient>
    <linearGradient id="taxi-bumper" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFA800"/>
      <stop offset="100%" stop-color="#E89500"/>
    </linearGradient>
  </defs>

  <!-- Hintergrund: Grünes Quadrat mit abgerundeten Ecken -->
  <rect width="192" height="192" rx="34" fill="url(#bg)"/>

  <!-- Standort-Pin oben (weiß) -->
  <g transform="translate(96, 30)">
    <path d="M 0 -20 C -10 -20 -18 -12 -18 -2 C -18 7 -10 14 0 26 C 10 14 18 7 18 -2 C 18 -12 10 -20 0 -20 Z" fill="#fff" stroke="#fff" stroke-width="0.5"/>
    <circle cx="0" cy="-3" r="6" fill="#1a9a37"/>
  </g>

  <!-- Funkwellen links (drei gebogene Linien) -->
  <g fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" opacity="0.95">
    <path d="M 22 78 Q 14 95 22 112"/>
    <path d="M 12 70 Q 0 95 12 120"/>
    <path d="M 2 64 Q -12 95 2 126"/>
  </g>

  <!-- Funkwellen rechts (drei gebogene Linien) -->
  <g fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" opacity="0.95">
    <path d="M 170 78 Q 178 95 170 112"/>
    <path d="M 180 70 Q 192 95 180 120"/>
    <path d="M 190 64 Q 204 95 190 126"/>
  </g>

  <!-- Taxi-Auto frontal (mittig) -->
  <g transform="translate(96, 95)">
    <!-- TAXI-Schild auf dem Dach -->
    <rect x="-16" y="-38" width="32" height="11" rx="1.5" fill="#fff" stroke="#1a1a1a" stroke-width="0.8"/>
    <text x="0" y="-29.8" font-size="9" font-family="Arial Black, Arial, sans-serif" font-weight="900" text-anchor="middle" fill="#000" letter-spacing="0.5">TAXI</text>

    <!-- Schatten unter dem Auto -->
    <ellipse cx="0" cy="32" rx="42" ry="3" fill="#000" opacity="0.18"/>

    <!-- Karosserie (frontale Sicht) — mit Dach -->
    <path d="M -36 6 L -36 -16 Q -34 -25 -22 -27 L 22 -27 Q 34 -25 36 -16 L 36 6 Z" fill="url(#taxi-body)" stroke="#a87a00" stroke-width="1.4"/>

    <!-- Dach-Trennung Linie -->
    <line x1="-32" y1="-13" x2="32" y2="-13" stroke="#a87a00" stroke-width="0.8" opacity="0.4"/>

    <!-- Windschutzscheibe (dunkel) -->
    <path d="M -28 -11 Q -27 -22 -18 -23 L 18 -23 Q 27 -22 28 -11 Z" fill="#1f2937" opacity="0.92"/>
    <!-- Scheibe-Reflexion -->
    <path d="M -22 -19 L -8 -22 L -10 -16 Z" fill="#fff" opacity="0.18"/>

    <!-- Front-Stoßstange -->
    <rect x="-38" y="6" width="76" height="14" rx="3" fill="url(#taxi-bumper)" stroke="#a87a00" stroke-width="1.2"/>

    <!-- Kühlergrill -->
    <rect x="-12" y="9" width="24" height="6" rx="1" fill="#1f2937" opacity="0.85"/>
    <line x1="-10" y1="12" x2="10" y2="12" stroke="#a87a00" stroke-width="0.6" opacity="0.6"/>

    <!-- Scheinwerfer links -->
    <ellipse cx="-26" cy="-2" rx="6" ry="5" fill="#fff" stroke="#a87a00" stroke-width="0.8"/>
    <circle cx="-26" cy="-2" r="2.4" fill="#FFE680"/>

    <!-- Scheinwerfer rechts -->
    <ellipse cx="26" cy="-2" rx="6" ry="5" fill="#fff" stroke="#a87a00" stroke-width="0.8"/>
    <circle cx="26" cy="-2" r="2.4" fill="#FFE680"/>

    <!-- Räder vorne (klein, da frontal) -->
    <ellipse cx="-30" cy="22" rx="6" ry="4" fill="#1f2937"/>
    <ellipse cx="30" cy="22" rx="6" ry="4" fill="#1f2937"/>

    <!-- Logo-Stern auf der Motorhaube (kleines Detail) -->
    <circle cx="0" cy="0" r="1.6" fill="#a87a00" opacity="0.5"/>
  </g>

  <!-- Schriftzug FUNK TAXI -->
  <text x="96" y="158" font-size="17" font-family="Arial Black, Impact, sans-serif" font-weight="900" text-anchor="middle" fill="#fff" letter-spacing="2.2">FUNK TAXI</text>

  <!-- Untertitel HERINGSDORF · USEDOM -->
  <text x="96" y="176" font-size="9" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle" fill="#fff" letter-spacing="1.2" opacity="0.95">HERINGSDORF · USEDOM</text>
</svg>
