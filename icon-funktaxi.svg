<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="sea" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f4c81"/>
      <stop offset="100%" stop-color="#1e6091"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f5d76e"/>
      <stop offset="100%" stop-color="#e6b94a"/>
    </linearGradient>
    <linearGradient id="taxi" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#F5B800"/>
    </linearGradient>
  </defs>

  <!-- Hintergrund (Meer) mit abgerundeten Ecken für maskable -->
  <rect width="192" height="192" rx="36" fill="url(#sea)"/>

  <!-- Wellen (drei sanfte Linien) -->
  <path d="M0 138 Q24 130 48 138 T96 138 T144 138 T192 138 L192 192 L0 192 Z" fill="#1e6091" opacity="0.55"/>
  <path d="M0 152 Q24 144 48 152 T96 152 T144 152 T192 152 L192 192 L0 192 Z" fill="#0f4c81" opacity="0.65"/>

  <!-- Insel-Silhouette (länglich wie Usedom) -->
  <path d="M28 122 Q60 116 96 118 Q132 120 164 122 Q172 128 164 132 Q132 134 96 132 Q60 130 28 132 Q22 128 28 122 Z" fill="url(#sand)" opacity="0.85"/>

  <!-- Taxi (oben mittig) -->
  <g transform="translate(56, 38)">
    <!-- Räder Schatten -->
    <ellipse cx="20" cy="50" rx="10" ry="3" fill="#000" opacity="0.18"/>
    <ellipse cx="60" cy="50" rx="10" ry="3" fill="#000" opacity="0.18"/>

    <!-- Karosserie unten -->
    <rect x="0" y="22" width="80" height="22" rx="6" fill="url(#taxi)" stroke="#a87a00" stroke-width="1.2"/>
    <!-- Dach -->
    <path d="M14 22 L24 8 L56 8 L66 22 Z" fill="url(#taxi)" stroke="#a87a00" stroke-width="1.2"/>
    <!-- Fenster vorne -->
    <path d="M28 22 L32 12 L40 12 L40 22 Z" fill="#90caf9" opacity="0.85"/>
    <!-- Fenster hinten -->
    <path d="M40 22 L40 12 L48 12 L52 22 Z" fill="#90caf9" opacity="0.85"/>

    <!-- Taxi-Schild aufs Dach -->
    <rect x="32" y="2" width="16" height="7" rx="1.5" fill="#fff" stroke="#a87a00" stroke-width="0.8"/>
    <text x="40" y="7.6" font-size="5.2" font-family="Arial Black, Arial, sans-serif" font-weight="900" text-anchor="middle" fill="#1f2937" letter-spacing="0.3">TAXI</text>

    <!-- Reifen -->
    <circle cx="20" cy="44" r="6.5" fill="#1f2937"/>
    <circle cx="20" cy="44" r="2.5" fill="#5c6470"/>
    <circle cx="60" cy="44" r="6.5" fill="#1f2937"/>
    <circle cx="60" cy="44" r="2.5" fill="#5c6470"/>

    <!-- Scheinwerfer -->
    <circle cx="76" cy="33" r="2.2" fill="#fff" opacity="0.95"/>
    <!-- Türgriff -->
    <rect x="34" y="29" width="12" height="1.6" rx="0.5" fill="#a87a00"/>
  </g>

  <!-- Schriftzug FUNK TAXI -->
  <text x="96" y="106" font-size="20" font-family="Arial Black, Impact, sans-serif" font-weight="900" text-anchor="middle" fill="#fff" letter-spacing="2.4">FUNK TAXI</text>

  <!-- Untertitel Heringsdorf · Usedom -->
  <text x="96" y="170" font-size="11" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle" fill="#fff" letter-spacing="0.6" opacity="0.95">HERINGSDORF · USEDOM</text>
</svg>
