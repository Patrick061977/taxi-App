// APP-LOGIK
// ═══════════════════════════════════════════════════════════════

const categories = [...new Set(FUNCTIONS.map(f => f.cat))];
const catColors = {
    'Fahrten':'#3b82f6','GPS':'#10b981','Fahrzeuge':'#f59e0b','Telegram':'#8b5cf6',
    'Cloud Functions':'#ec4899','UI':'#6366f1','Auth':'#14b8a6','Benachrichtigungen':'#f97316',
    'Kommunikation':'#06b6d4','Anrufe':'#84cc16','Logging':'#a855f7','Backup':'#64748b',
    'OEPNV':'#ef4444','Geocoding':'#22d3ee','CRM':'#d946ef','Stornierung':'#fb923c'
};
const catIcons = {
    'Fahrten':'🚗','GPS':'📍','Fahrzeuge':'🚕','Telegram':'📱','Cloud Functions':'☁️',
    'UI':'🖥️','Auth':'🔐','Benachrichtigungen':'🔔','Kommunikation':'💬','Anrufe':'📞',
    'Logging':'📋','Backup':'💾','OEPNV':'🚌','Geocoding':'🗺️','CRM':'👥','Stornierung':'❌'
};

let activeCategory = null;
let searchTerm = '';

function init() {
    renderFilterChips();
    renderSidebar();
    renderMain();
    updateStats();

    document.getElementById('searchInput').addEventListener('input', (e) => {
        searchTerm = e.target.value.toLowerCase().trim();
        renderMain();
        updateStats();
    });

    window.addEventListener('scroll', () => {
        document.getElementById('backTop').style.display = window.scrollY > 400 ? 'block' : 'none';
    });
}

function getFilteredFunctions() {
    return FUNCTIONS.filter(f => {
        if (activeCategory && f.cat !== activeCategory) return false;
        if (searchTerm) {
            const haystack = (f.name + ' ' + f.desc + ' ' + f.cat + ' ' + (f.sub||'') + ' ' + f.params.join(' ')).toLowerCase();
            return haystack.includes(searchTerm);
        }
        return true;
    });
}

function renderFilterChips() {
    const el = document.getElementById('filterChips');
    el.innerHTML = categories.map(cat => {
        const count = FUNCTIONS.filter(f => f.cat === cat).length;
        return `<span class="chip${activeCategory===cat?' active':''}" onclick="toggleCategory('${cat}')">${catIcons[cat]||''} ${cat} (${count})</span>`;
    }).join('');
}

function toggleCategory(cat) {
    activeCategory = activeCategory === cat ? null : cat;
    renderFilterChips();
    renderSidebar();
    renderMain();
    updateStats();
}

function renderSidebar() {
    const el = document.getElementById('sidebar');
    const filtered = getFilteredFunctions();
    const grouped = {};
    filtered.forEach(f => {
        const key = f.cat;
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(f);
    });

    let html = '';
    Object.entries(grouped).forEach(([cat, funcs]) => {
        html += `<div class="sidebar-section">`;
        html += `<div class="sidebar-title">${catIcons[cat]||''} ${cat}</div>`;
        // Group by sub
        const subs = {};
        funcs.forEach(f => {
            const s = f.sub || 'Allgemein';
            if (!subs[s]) subs[s] = [];
            subs[s].push(f);
        });
        Object.entries(subs).forEach(([sub, sfuncs]) => {
            html += `<div class="sidebar-item" onclick="scrollToSub('${cat}','${sub}')">
                ${sub} <span class="count">${sfuncs.length}</span>
            </div>`;
        });
        html += `</div>`;
    });
    el.innerHTML = html;
}

function scrollToSub(cat, sub) {
    const id = `section-${cat}-${sub}`.replace(/[^a-zA-Z0-9-]/g, '_');
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function highlightText(text, term) {
    if (!term) return text;
    const regex = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    return text.replace(regex, '<mark>$1</mark>');
}

function renderMain() {
    const el = document.getElementById('mainContent');
    const filtered = getFilteredFunctions();

    if (filtered.length === 0) {
        el.innerHTML = `<div class="no-results">
            <div class="icon">🔍</div>
            <h3>Keine Funktionen gefunden</h3>
            <p>Versuche einen anderen Suchbegriff oder entferne den Filter.</p>
        </div>`;
        return;
    }

    // Group by cat -> sub
    const grouped = {};
    filtered.forEach(f => {
        const key = f.cat;
        if (!grouped[key]) grouped[key] = {};
        const sub = f.sub || 'Allgemein';
        if (!grouped[key][sub]) grouped[key][sub] = [];
        grouped[key][sub].push(f);
    });

    let html = '';
    Object.entries(grouped).forEach(([cat, subs]) => {
        Object.entries(subs).forEach(([sub, funcs]) => {
            const sectionId = `section-${cat}-${sub}`.replace(/[^a-zA-Z0-9-]/g, '_');
            html += `<div class="category-header" id="${sectionId}">
                <h2><span style="color:${catColors[cat]||'#60a5fa'}">${catIcons[cat]||''}</span> ${cat} &rsaquo; ${sub}</h2>
            </div>`;
            funcs.forEach(f => {
                const name = highlightText(f.name, searchTerm);
                const desc = highlightText(f.desc, searchTerm);
                html += `<div class="func-card">
                    <div class="func-name">${name}(${f.params.length > 0 ? '...' : ''})${f.async ? '<span class="async-badge">async</span>' : ''}</div>
                    <div class="func-line">${f.file}:${f.line}</div>
                    ${f.params.length > 0 ? `<div class="func-params">${f.params.map(p => `<span class="param-tag">${highlightText(p, searchTerm)}</span>`).join('')}</div>` : ''}
                    <div class="func-desc">${desc}</div>
                    <div class="func-tags">
                        <span class="tag tag-category" style="background:${catColors[f.cat]||'#4c1d95'}30;color:${catColors[f.cat]||'#c4b5fd'}">${f.cat}</span>
                        <span class="tag tag-file">${f.file}</span>
                    </div>
                </div>`;
            });
        });
    });
    el.innerHTML = html;
}

function updateStats() {
    const total = FUNCTIONS.length;
    const filtered = getFilteredFunctions().length;
    document.getElementById('totalCount').textContent = `${total} Funktionen gesamt`;
    const fc = document.getElementById('filteredCount');
    if (filtered !== total) {
        fc.style.display = 'inline';
        fc.textContent = `• ${filtered} angezeigt`;
    } else {
        fc.style.display = 'none';
    }
}

document.addEventListener('DOMContentLoaded', init);
</script>
