<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bgA" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#2bbf48"/>
      <stop offset="100%" stop-color="#1a9a37"/>
    </linearGradient>
    <linearGradient id="bodyA" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="50%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#F5B800"/>
    </linearGradient>
    <radialGradient id="lightA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fffde0"/>
      <stop offset="60%" stop-color="#FFE680"/>
      <stop offset="100%" stop-color="#F0C040"/>
    </radialGradient>
  </defs>

  <rect width="192" height="192" rx="34" fill="url(#bgA)"/>

  <!-- Standort-Pin oben -->
  <g transform="translate(96, 30)">
    <path d="M 0 -22 C -10 -22 -18 -14 -18 -4 C -18 6 -10 13 0 28 C 10 13 18 6 18 -4 C 18 -14 10 -22 0 -22 Z" fill="#fff" stroke="#155f24" stroke-width="0.8"/>
    <circle cx="0" cy="-5" r="6.5" fill="#1a9a37"/>
  </g>

  <!-- Funkwellen links -->
  <g fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round">
    <path d="M 22 76 Q 14 96 22 116"/>
    <path d="M 11 68 Q -2 96 11 124"/>
    <path d="M 0 60 Q -14 96 0 132"/>
  </g>

  <!-- Funkwellen rechts -->
  <g fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round">
    <path d="M 170 76 Q 178 96 170 116"/>
    <path d="M 181 68 Q 194 96 181 124"/>
    <path d="M 192 60 Q 206 96 192 132"/>
  </g>

  <!-- Frontales Taxi (detailliert) -->
  <g transform="translate(96, 100)">
    <!-- Bodenschatten -->
    <ellipse cx="0" cy="36" rx="46" ry="3.5" fill="#000" opacity="0.22"/>

    <!-- Untere Stoßstange (dunkel) -->
    <rect x="-42" y="20" width="84" height="13" rx="3" fill="#1a1a1a"/>

    <!-- Karosserie / Vorderfront -->
    <path d="M -40 21 L -40 0 Q -40 -8 -34 -10 L -30 -22 Q -27 -28 -20 -29 L 20 -29 Q 27 -28 30 -22 L 34 -10 Q 40 -8 40 0 L 40 21 Z"
          fill="url(#bodyA)" stroke="#a06a00" stroke-width="1.5"/>

    <!-- Dach-Hinterkante (Linie für Tiefenwirkung) -->
    <path d="M -32 -10 Q -28 -14 -20 -14 L 20 -14 Q 28 -14 32 -10" stroke="#a06a00" stroke-width="1.2" fill="none" opacity="0.5"/>

    <!-- Windschutzscheibe -->
    <path d="M -28 -10 L -22 -23 Q -20 -25 -16 -25 L 16 -25 Q 20 -25 22 -23 L 28 -10 Z"
          fill="#2c3e50"/>
    <!-- Reflexion auf Scheibe -->
    <path d="M -20 -16 L -6 -23 L -2 -23 L -10 -16 Z" fill="#fff" opacity="0.18"/>
    <!-- Mittelpfosten (vertikale Linie zwischen Scheibe) -->
    <line x1="0" y1="-10" x2="0" y2="-25" stroke="#1a1a1a" stroke-width="0.8" opacity="0.6"/>

    <!-- TAXI-Schild auf dem Dach -->
    <rect x="-16" y="-39" width="32" height="14" rx="1.6" fill="#fff" stroke="#1a1a1a" stroke-width="1"/>
    <text x="0" y="-29" font-size="10.5" font-family="Arial Black, Arial, sans-serif" font-weight="900" text-anchor="middle" fill="#000" letter-spacing="0.6">TAXI</text>
    <!-- Schild-Halterung am Dach -->
    <rect x="-2" y="-25" width="4" height="2" fill="#1a1a1a"/>

    <!-- Scheinwerfer links -->
    <ellipse cx="-28" cy="3" rx="7.5" ry="6" fill="#fff" stroke="#a06a00" stroke-width="1"/>
    <ellipse cx="-28" cy="3" rx="4.8" ry="3.7" fill="url(#lightA)"/>
    <ellipse cx="-29.5" cy="1.2" rx="1.8" ry="1.2" fill="#fff" opacity="0.9"/>

    <!-- Scheinwerfer rechts -->
    <ellipse cx="28" cy="3" rx="7.5" ry="6" fill="#fff" stroke="#a06a00" stroke-width="1"/>
    <ellipse cx="28" cy="3" rx="4.8" ry="3.7" fill="url(#lightA)"/>
    <ellipse cx="26.5" cy="1.2" rx="1.8" ry="1.2" fill="#fff" opacity="0.9"/>

    <!-- Kühlergrill -->
    <rect x="-13" y="6" width="26" height="11" rx="1.5" fill="#0a0a0a"/>
    <line x1="-11" y1="9" x2="11" y2="9" stroke="#FFD600" stroke-width="0.4" opacity="0.5"/>
    <line x1="-11" y1="12" x2="11" y2="12" stroke="#FFD600" stroke-width="0.4" opacity="0.5"/>
    <line x1="-11" y1="15" x2="11" y2="15" stroke="#FFD600" stroke-width="0.4" opacity="0.5"/>

    <!-- Funktaxi-Logo-Punkt auf Motorhaube -->
    <circle cx="0" cy="-2" r="2" fill="#a06a00" opacity="0.4"/>

    <!-- Räder vorne (sichtbar von vorne) -->
    <ellipse cx="-34" cy="32" rx="9" ry="5" fill="#0a0a0a"/>
    <ellipse cx="-34" cy="32" rx="4" ry="2.5" fill="#3a3a3a"/>
    <ellipse cx="34" cy="32" rx="9" ry="5" fill="#0a0a0a"/>
    <ellipse cx="34" cy="32" rx="4" ry="2.5" fill="#3a3a3a"/>
  </g>

  <!-- FUNK TAXI Schriftzug -->
  <text x="96" y="158" font-size="17" font-family="Arial Black, Impact, sans-serif" font-weight="900" text-anchor="middle" fill="#fff" letter-spacing="2.2">FUNK TAXI</text>

  <!-- Untertitel -->
  <text x="96" y="176" font-size="9" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle" fill="#fff" letter-spacing="1.2" opacity="0.95">HERINGSDORF · USEDOM</text>
</svg>
