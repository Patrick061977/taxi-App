<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Zahlung erfolgreich — Funk Taxi Heringsdorf</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #10b981 0%, #047857 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #1e293b;
        }
        .card {
            background: white;
            border-radius: 20px;
            max-width: 440px;
            width: 100%;
            padding: 40px 28px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .icon { font-size: 72px; margin-bottom: 12px; animation: pop 0.5s ease-out; }
        @keyframes pop {
            0% { transform: scale(0); }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        h1 { color: #047857; font-size: 26px; font-weight: 800; margin-bottom: 8px; }
        p { color: #475569; font-size: 15px; line-height: 1.5; margin-bottom: 20px; }
        .invoice-ref {
            background: #f0fdf4;
            border: 1px solid #86efac;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 22px;
            font-size: 14px;
        }
        .invoice-ref-label { font-size: 11px; color: #15803d; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 4px; }
        .invoice-ref-value { font-family: monospace; color: #1e293b; word-break: break-all; }
        .btn {
            display: block;
            padding: 14px 20px;
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 10px;
        }
        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
            font-weight: 600;
        }
        .footer { margin-top: 20px; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✅</div>
        <h1>Zahlung erfolgreich</h1>
        <p>Vielen Dank — Ihre Zahlung ist eingegangen. Eine Bestätigung erhalten Sie per E-Mail.</p>
        <div class="invoice-ref" id="invoice-ref" style="display:none;">
            <div class="invoice-ref-label">Rechnungsnummer</div>
            <div class="invoice-ref-value" id="invoice-ref-value">–</div>
        </div>
        <a href="landing.html" class="btn">🏠 Zur Startseite</a>
        <a href="tel:03837822022" class="btn btn-secondary">📞 Bei Fragen: 038378 / 22022</a>
        <div class="footer">Funk Taxi Heringsdorf</div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const invoice = params.get('invoice');
        if (invoice) {
            document.getElementById('invoice-ref-value').textContent = invoice;
            document.getElementById('invoice-ref').style.display = 'block';
        }
    </script>
</body>
</html>
