name: Auto-Deploy zu GitHub Pages

on:
  push:
    branches:
      - main  # Triggert bei jedem Push auf main

permissions:
  contents: read
  pages: write
  id-token: write

# 🔧 v6.41.45/48: Concurrency-Gruppe gegen GitHub-Pages-Deploy-Kollision.
# GitHub Pages serialisiert DEPLOYMENTS server-seitig — cancel-in-progress:true
# cancelt nur Workflow-Runs, nicht die laufenden Pages-API-Deployments selbst.
# Folge: neuer Workflow läuft, macht API-Call, API sagt '400 in progress' → Fehler.
# Fix: cancel-in-progress:false → neue Workflows WARTEN bis der alte fertig ist,
# dann läuft der nächste sauber. Kein paralleler Konflikt mehr.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Version-Info einfügen
        run: |
          # Git Commit Hash
          COMMIT_HASH=$(git rev-parse HEAD)
          SHORT_HASH=$(git rev-parse --short HEAD)

          # Build-Datum (Deutschland-Zeit)
          BUILD_DATE=$(TZ=Europe/Berlin date '+%d.%m.%Y %H:%M')

          # Ersetze Platzhalter in index.html
          sed -i "s/GIT_COMMIT_HASH/$COMMIT_HASH/g" index.html
          sed -i "s/BUILD_DATE/$BUILD_DATE/g" index.html

          echo "✅ Version-Info eingefügt:"
          echo "   Commit: $SHORT_HASH"
          echo "   Datum:  $BUILD_DATE"

      - name: 📦 GitHub Pages Setup
        uses: actions/configure-pages@v4

      # 🆕 11.06.2026 Patrick 05:54 'Run failed' bei Attempt #2:
      # Bei Re-Runs entsteht ein zweites Artifact 'github-pages' (Bug
      # https://github.com/actions/upload-pages-artifact/issues/86).
      # Loesche bestehende erst, dann upload neu.
      - name: 🧹 Alte github-pages Artifacts loeschen
        uses: geekyeggo/delete-artifact@v5
        with:
          name: github-pages
          failOnError: false

      - name: 📤 Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🚀 Deploy zu GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        # continue-on-error: GitHub Pages Queue hängt manchmal (deployment_queued Timeout).
        # Prod-Deploys laufen über Firebase Hosting + Strato. Pages ist Backup.
        continue-on-error: true

      - name: ✅ Deployment Info
        run: |
          if [ "${{ steps.deployment.outcome }}" = "success" ]; then
            echo "✅ GitHub Pages deployed: ${{ steps.deployment.outputs.page_url }}"
          else
            echo "⚠️ GitHub Pages Queue-Timeout (deploy_queued) — Prod läuft auf Firebase+Strato"
          fi
