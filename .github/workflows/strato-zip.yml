name: Strato ZIP erstellen

on:
  push:
    # 🔧 v6.41.48: Nur auf main — vorher '**' triggerte AUCH auf Feature-Branches,
    # dadurch 2 Runs pro Merge (1× Branch-Push + 1× Main-Merge-Push). Verschwenderisch.
    branches: [main]
    paths:
      - 'index.html'
      - 'kunden.html'
      - 'buchen.html'
      - 'buchung-test.html'
      - 'landing.html'
      - 'berlin.html'
      - 'anfrage.html'
      - 'track.html'
      - 'payment-success.html'
      - 'payment-cancel.html'
      - 'manifest.json'
      - 'service-worker.js'
      - 'favicon.svg'
      - 'icon-192.png'
      - 'advanced-logger.js'
      - 'firebase-remote-logger.js'
      - 'google*.html'
      - 'strato/**'

  workflow_dispatch:

jobs:
  build-strato-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Strato-Upload zusammenstellen
        run: bash strato/deploy.sh

      - name: ZIP erstellen
        run: |
          cd strato-upload
          zip -r ../strato-deploy.zip .
          echo "## Strato Deploy ZIP" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Dateien im ZIP:" >> $GITHUB_STEP_SUMMARY
          find . -type f | sort | while read f; do
            SIZE=$(du -h "$f" | cut -f1)
            echo "- \`${f}\` ($SIZE)" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Download:** Unter *Artifacts* unten auf dieser Seite" >> $GITHUB_STEP_SUMMARY

      - name: ZIP als Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: strato-deploy
          path: strato-deploy.zip
          retention-days: 30

      # 🆕 v6.41.80: Automatischer FTP-Upload auf Strato.
      # Läuft nur, wenn alle drei Secrets gesetzt sind — so bleibt der Workflow funktionsfähig
      # auch solange die Zugangsdaten noch PLACEHOLDER sind. Sobald die Secrets echte Werte
      # haben, greift der Upload beim nächsten Push automatisch (wie Firebase Hosting).
      - name: Prüfen ob Strato-Secrets gesetzt sind
        id: check-secrets
        run: |
          if [ -n "${{ secrets.STRATO_FTP_HOST }}" ] \
             && [ "${{ secrets.STRATO_FTP_HOST }}" != "PLACEHOLDER_UPDATE_ME" ] \
             && [ -n "${{ secrets.STRATO_FTP_USER }}" ] \
             && [ "${{ secrets.STRATO_FTP_USER }}" != "PLACEHOLDER_UPDATE_ME" ] \
             && [ -n "${{ secrets.STRATO_FTP_PASSWORD }}" ] \
             && [ "${{ secrets.STRATO_FTP_PASSWORD }}" != "PLACEHOLDER_UPDATE_ME" ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
            echo "✅ Strato-Secrets gesetzt — FTP-Upload aktiv"
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "⏭️ Strato-Secrets fehlen oder sind PLACEHOLDER — FTP-Upload übersprungen"
            echo "   (ZIP liegt als Artifact zum manuellen Upload bereit)"
          fi

      - name: FTP-Upload auf Strato
        if: steps.check-secrets.outputs.ready == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.STRATO_FTP_HOST }}
          username: ${{ secrets.STRATO_FTP_USER }}
          password: ${{ secrets.STRATO_FTP_PASSWORD }}
          local-dir: ./strato-upload/
          server-dir: /
          # Safe: nichts löschen was auf dem Server liegt aber nicht im Upload ist
          dangerous-clean-slate: false
          # Nur geänderte Dateien hochladen (SHA256-Vergleich via .ftp-deploy-sync-state.json)
          state-name: .ftp-deploy-sync-state.json
          log-level: minimal
