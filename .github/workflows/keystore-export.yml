name: Keystore Export (einmalig)

# WICHTIG: Nur manuell triggern! Lädt den Keystore als Download-Artifact hoch
# damit der Admin ihn auf einem sicheren Speicherort (USB, Passwort-Manager) sichern kann.
# Nach dem Download sollte dieser Workflow idealerweise wieder gelöscht werden.

on:
  workflow_dispatch:

jobs:
  export-keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Keystore aus Secret dekodieren
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "❌ Secret ANDROID_KEYSTORE_BASE64 ist leer!"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > taxi-app.keystore
          ls -la taxi-app.keystore
          echo "## 🔐 Keystore-Export" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Die Datei \`taxi-app.keystore\` ist unter **Artifacts** unten zu finden." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Wichtig:**" >> $GITHUB_STEP_SUMMARY
          echo "- Datei herunterladen + an 2 sicheren Orten speichern (USB-Stick + verschlüsselter Cloud-Ordner)" >> $GITHUB_STEP_SUMMARY
          echo "- Passwort separat im Passwort-Manager speichern" >> $GITHUB_STEP_SUMMARY
          echo "- Nach Download: Artifact löschen (unten auf 'Delete all artifacts')" >> $GITHUB_STEP_SUMMARY
          echo "- Diesen Workflow-Lauf danach löschen (3 Punkte Menü → Delete workflow run)" >> $GITHUB_STEP_SUMMARY

      - name: Keystore als Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: taxi-app-keystore
          path: taxi-app.keystore
          retention-days: 7
