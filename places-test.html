<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Places API Test — Taxi Usedom</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f4f8; padding: 20px; }
        h1 { font-size: 20px; margin-bottom: 16px; color: #1e293b; }
        .test-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 16px; max-width: 600px; }
        .test-card h2 { font-size: 16px; color: #059669; margin-bottom: 12px; }
        input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; margin-bottom: 8px; }
        input:focus { border-color: #059669; outline: none; }
        .results { max-height: 400px; overflow-y: auto; }
        .result-item { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; cursor: pointer; font-size: 14px; display: flex; align-items: flex-start; gap: 8px; }
        .result-item:hover { background: #ecfdf5; }
        .result-name { font-weight: 600; color: #1e293b; }
        .result-addr { font-size: 12px; color: #64748b; }
        .result-type { font-size: 11px; color: #059669; background: #ecfdf5; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-top: 2px; }
        .status { padding: 8px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
        .status.ok { background: #d1fae5; color: #065f46; }
        .status.error { background: #fecaca; color: #991b1b; }
        .status.loading { background: #e2e8f0; color: #64748b; }
        .log { background: #1e293b; color: #e2e8f0; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 11px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; margin-top: 12px; }
    </style>
</head>
<body>
    <h1>🔍 Google Places API Test (New API)</h1>

    <div class="test-card">
        <h2>1. API Key Status</h2>
        <div class="status loading" id="api-status">⏳ Lade Google Maps...</div>
    </div>

    <div class="test-card">
        <h2>2. Autocomplete Test (Usedom-Region)</h2>
        <input type="text" id="search-input" placeholder="z.B. Kaffee Knatter, Stadtbäckerei, Reha Klinik...">
        <div class="results" id="results"><div style="padding:10px;color:#94a3b8;">Tippe um zu suchen...</div></div>
    </div>

    <div class="test-card">
        <h2>3. Vergleich: Google Places vs Nominatim</h2>
        <input type="text" id="compare-input" placeholder="Suchbegriff eingeben...">
        <div style="display:flex;gap:12px;margin-top:8px;">
            <div style="flex:1;">
                <div style="font-weight:700;font-size:13px;color:#3b82f6;margin-bottom:4px;">Google Places</div>
                <div id="google-results" style="font-size:12px;color:#94a3b8;">Warte...</div>
            </div>
            <div style="flex:1;">
                <div style="font-weight:700;font-size:13px;color:#f59e0b;margin-bottom:4px;">Nominatim</div>
                <div id="nominatim-results" style="font-size:12px;color:#94a3b8;">Warte...</div>
            </div>
        </div>
    </div>

    <div class="test-card">
        <h2>4. Debug Log</h2>
        <div class="log" id="debug-log">Warte auf Google Maps API...</div>
    </div>

    <!-- Google Maps JS mit Places New Library -->
    <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCEL-wtoIrVm0-PXpILLabGQXfuFaA17lg&libraries=places&language=de&v=weekly&loading=async&callback=initPlaces"></script>

    <script>
        const logEl = document.getElementById('debug-log');
        function log(msg) {
            const time = new Date().toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
            logEl.textContent = `[${time}] ${msg}\n` + logEl.textContent;
        }

        const USEDOM_CENTER = { lat: 53.95, lng: 14.10 };

        let Place = null;
        let AutocompleteSessionToken = null;
        let AutocompleteSuggestion = null;

        // Init mit neuer API (wird als callback vom Script-Tag aufgerufen)
        window.initPlaces = async function() {
            try {
                const { Place: P, AutocompleteSessionToken: T, AutocompleteSuggestion: S } = await google.maps.importLibrary("places");
                Place = P;
                AutocompleteSessionToken = T;
                AutocompleteSuggestion = S;
                log('✅ Google Places (New) geladen!');
                document.getElementById('api-status').className = 'status ok';
                document.getElementById('api-status').textContent = '✅ Google Places API (New) aktiv — bereit zum Suchen!';
            } catch(e) {
                log('❌ Fehler: ' + e.message);
                document.getElementById('api-status').className = 'status error';
                document.getElementById('api-status').textContent = '❌ ' + e.message;
            }
        }

        // Autocomplete mit neuer API
        async function searchPlaces(query) {
            if (!AutocompleteSuggestion || !query || query.length < 2) return;
            const resultsEl = document.getElementById('results');
            resultsEl.innerHTML = '<div style="padding:10px;color:#64748b;">⏳ Suche...</div>';
            log(`🔍 Suche: "${query}"`);

            try {
                const token = new AutocompleteSessionToken();
                const { suggestions } = await AutocompleteSuggestion.fetchAutocompleteSuggestions({
                    input: query,
                    locationBias: {
                        center: USEDOM_CENTER,
                        radius: 25000
                    },
                    language: 'de',
                    region: 'de',
                    sessionToken: token
                });

                log(`✅ ${suggestions.length} Vorschlaege`);

                if (suggestions.length === 0) {
                    resultsEl.innerHTML = '<div style="padding:10px;color:#ef4444;">❌ Keine Treffer</div>';
                    return;
                }

                const html = [];
                for (const s of suggestions) {
                    const p = s.placePrediction;
                    if (!p) continue;
                    const mainText = p.mainText?.text || p.text?.text || '?';
                    const secText = p.secondaryText?.text || '';
                    const types = (p.types || []).slice(0, 3).join(', ');
                    const placeId = p.placeId || '';
                    log(`   📍 ${mainText} | ${secText} | ${types}`);
                    html.push(`<div class="result-item" onclick="getDetails('${placeId}')">
                        <span>📍</span>
                        <div>
                            <div class="result-name">${mainText}</div>
                            <div class="result-addr">${secText}</div>
                            <span class="result-type">${types || 'ort'}</span>
                        </div>
                    </div>`);
                }
                resultsEl.innerHTML = html.join('');
            } catch(e) {
                log(`❌ Fehler: ${e.message}`);
                resultsEl.innerHTML = `<div style="padding:10px;color:#ef4444;">❌ ${e.message}</div>`;
            }
        }

        // Place Details
        async function getDetails(placeId) {
            if (!Place || !placeId) return;
            try {
                const place = new Place({ id: placeId });
                await place.fetchFields({ fields: ['displayName', 'formattedAddress', 'location', 'types'] });
                const lat = place.location?.lat();
                const lng = place.location?.lng();
                log(`📍 DETAILS: ${place.displayName}`);
                log(`   Adresse: ${place.formattedAddress}`);
                log(`   Koordinaten: ${lat?.toFixed(5)}, ${lng?.toFixed(5)}`);
                log(`   Types: ${(place.types || []).join(', ')}`);
                alert(`${place.displayName}\n${place.formattedAddress}\n\n📍 ${lat?.toFixed(5)}, ${lng?.toFixed(5)}`);
            } catch(e) {
                log(`❌ Details Fehler: ${e.message}`);
            }
        }

        // Vergleich
        let compareTimer = null;
        document.getElementById('compare-input').addEventListener('input', (e) => {
            clearTimeout(compareTimer);
            compareTimer = setTimeout(() => compareSearch(e.target.value), 500);
        });

        async function compareSearch(query) {
            if (!query || query.length < 3) return;
            const googleEl = document.getElementById('google-results');
            const nomEl = document.getElementById('nominatim-results');
            googleEl.innerHTML = '⏳ Suche...';
            nomEl.innerHTML = '⏳ Suche...';

            // Google Places (New)
            if (AutocompleteSuggestion) {
                try {
                    const token = new AutocompleteSessionToken();
                    const { suggestions } = await AutocompleteSuggestion.fetchAutocompleteSuggestions({
                        input: query,
                        locationBias: { center: USEDOM_CENTER, radius: 25000 },
                        language: 'de', region: 'de', sessionToken: token
                    });
                    if (suggestions.length === 0) {
                        googleEl.innerHTML = '❌ 0 Treffer';
                    } else {
                        googleEl.innerHTML = suggestions.map(s => {
                            const p = s.placePrediction;
                            return `<div style="padding:4px 0;border-bottom:1px solid #f1f5f9;">📍 <b>${p?.mainText?.text || '?'}</b><br><span style="color:#94a3b8;font-size:11px;">${p?.secondaryText?.text || ''}</span></div>`;
                        }).join('');
                    }
                } catch(e) {
                    googleEl.innerHTML = '❌ ' + e.message;
                }
            }

            // Nominatim
            try {
                const resp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query + ', Usedom')}&limit=5&addressdetails=1&viewbox=13.60,54.20,14.45,53.75&bounded=0`, { headers: { 'User-Agent': 'TaxiUsedom/1.0' } });
                const data = await resp.json();
                if (data.length === 0) {
                    nomEl.innerHTML = '❌ 0 Treffer';
                } else {
                    nomEl.innerHTML = data.map(item => `<div style="padding:4px 0;border-bottom:1px solid #f1f5f9;">🗺️ ${item.display_name.split(',').slice(0,3).join(',')}</div>`).join('');
                }
            } catch(e) {
                nomEl.innerHTML = '❌ Fehler';
            }
        }

        // Debounce Suche
        let searchTimer = null;
        document.getElementById('search-input').addEventListener('input', (e) => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => searchPlaces(e.target.value), 300);
        });
    </script>
</body>
</html>
