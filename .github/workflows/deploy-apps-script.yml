name: Deploy Google Apps Script (Kalender-Sync)

# v1.0 (Patrick 14.07.2026): Auto-Push zu Google Apps Script via clasp.
# Trigger: Push auf main mit Änderungen in google-apps-script/
# Voraussetzung: GitHub Secrets CLASP_CREDENTIALS + CLASP_SCRIPT_ID

on:
  push:
    branches: [main]
    paths:
      - 'google-apps-script/kalender-sync-v*.js'
      - '.github/workflows/deploy-apps-script.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Restore clasp credentials
        run: |
          echo "${{ secrets.CLASP_CREDENTIALS }}" > ~/.clasprc.json

      - name: Prepare apps-script deploy dir
        run: |
          mkdir -p _clasp-deploy
          # Nur die neueste Version (v5.6.js z.B.) als Code.gs kopieren
          LATEST=$(ls -1 google-apps-script/kalender-sync-v*.js | grep -v backup | sort -V | tail -1)
          echo "Deploying: $LATEST"
          cp "$LATEST" _clasp-deploy/Code.gs
          # .clasp.json mit Script-ID aus Secret
          cat > _clasp-deploy/.clasp.json <<EOF
          {"scriptId":"${{ secrets.CLASP_SCRIPT_ID }}","rootDir":"."}
          EOF
          # appsscript.json (Manifest — minimal)
          cat > _clasp-deploy/appsscript.json <<EOF
          {"timeZone":"Europe/Berlin","dependencies":{},"exceptionLogging":"STACKDRIVER","runtimeVersion":"V8"}
          EOF

      - name: Push to Apps Script
        run: |
          cd _clasp-deploy
          clasp push --force
