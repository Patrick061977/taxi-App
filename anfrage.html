<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi vorbestellen — Funk Taxi Heringsdorf</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; background:transparent; color:#1e293b; }
    </style>
</head>
<body>
    <div style="max-width:500px;margin:0 auto;padding:12px;">
        <div style="background:white;border-radius:16px;box-shadow:0 4px 16px rgba(0,0,0,0.08);padding:24px;">
            <div style="text-align:center;margin-bottom:16px;">
                <div style="font-size:20px;font-weight:700;color:#059669;">🚕 Taxi vorbestellen</div>
                <div style="font-size:13px;color:#64748b;">Mit Preisrechner &mdash; Anfrage per WhatsApp oder E-Mail</div>
            </div>
            <div style="margin-bottom:12px;">
                <label style="display:block;font-size:12px;color:#64748b;font-weight:600;margin-bottom:4px;">📍 Abholort</label>
                <input type="text" id="anf-pickup" placeholder="z.B. Seestr. 12, Heringsdorf" style="width:100%;padding:12px;border:2px solid #e2e8f0;border-radius:10px;font-size:15px;" autocomplete="off">
                <div id="anf-pickup-dropdown" style="display:none;position:relative;background:white;border:2px solid #059669;border-radius:10px;max-height:180px;overflow-y:auto;z-index:100;margin-top:4px;box-shadow:0 8px 24px rgba(0,0,0,0.15);"></div>
            </div>
            <div style="margin-bottom:12px;">
                <label style="display:block;font-size:12px;color:#64748b;font-weight:600;margin-bottom:4px;">🎯 Zielort</label>
                <input type="text" id="anf-dest" placeholder="z.B. Bahnhof Heringsdorf" style="width:100%;padding:12px;border:2px solid #e2e8f0;border-radius:10px;font-size:15px;" autocomplete="off">
                <div id="anf-dest-dropdown" style="display:none;position:relative;background:white;border:2px solid #059669;border-radius:10px;max-height:180px;overflow-y:auto;z-index:100;margin-top:4px;box-shadow:0 8px 24px rgba(0,0,0,0.15);"></div>
            </div>
            <div style="display:flex;gap:8px;margin-bottom:12px;">
                <div style="flex:1;">
                    <label style="display:block;font-size:12px;color:#64748b;font-weight:600;margin-bottom:4px;">📅 Datum</label>
                    <input type="date" id="anf-date" style="width:100%;padding:10px;border:2px solid #e2e8f0;border-radius:10px;font-size:14px;" onchange="calcAnfPrice()">
                </div>
                <div style="flex:1;">
                    <label style="display:block;font-size:12px;color:#64748b;font-weight:600;margin-bottom:4px;">🕐 Uhrzeit</label>
                    <input type="time" id="anf-time" style="width:100%;padding:10px;border:2px solid #e2e8f0;border-radius:10px;font-size:14px;" onchange="calcAnfPrice()">
                </div>
            </div>
            <div style="margin-bottom:12px;">
                <label style="display:block;font-size:12px;color:#64748b;font-weight:600;margin-bottom:4px;">👥 Personen</label>
                <div style="display:flex;gap:6px;" id="anf-pax-btns">
                    <button onclick="setAnfPax(1)" class="anf-pax active" style="flex:1;padding:10px;border:2px solid #059669;background:#ecfdf5;color:#059669;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;">1</button>
                    <button onclick="setAnfPax(2)" class="anf-pax" style="flex:1;padding:10px;border:2px solid #e2e8f0;background:white;border-radius:8px;font-size:15px;cursor:pointer;">2</button>
                    <button onclick="setAnfPax(3)" class="anf-pax" style="flex:1;padding:10px;border:2px solid #e2e8f0;background:white;border-radius:8px;font-size:15px;cursor:pointer;">3</button>
                    <button onclick="setAnfPax(4)" class="anf-pax" style="flex:1;padding:10px;border:2px solid #e2e8f0;background:white;border-radius:8px;font-size:15px;cursor:pointer;">4</button>
                    <button onclick="setAnfPax(5)" class="anf-pax" style="flex:1;padding:10px;border:2px solid #e2e8f0;background:white;border-radius:8px;font-size:15px;cursor:pointer;">5+</button>
                </div>
            </div>
            <div style="display:flex;gap:8px;margin-bottom:12px;">
                <div style="flex:1;">
                    <label style="display:block;font-size:12px;color:#64748b;font-weight:600;margin-bottom:4px;">👤 Name</label>
                    <input type="text" id="anf-name" placeholder="Vor- und Nachname *" required style="width:100%;padding:10px;border:2px solid #e2e8f0;border-radius:10px;font-size:14px;">
                </div>
                <div style="flex:1;">
                    <label style="display:block;font-size:12px;color:#64748b;font-weight:600;margin-bottom:4px;">📱 Telefon</label>
                    <input type="tel" id="anf-phone" placeholder="0176 12345678 *" required style="width:100%;padding:10px;border:2px solid #e2e8f0;border-radius:10px;font-size:14px;">
                </div>
            </div>
            <div id="anf-price-box" style="display:none;background:#f0fdf4;border:2px solid #a7f3d0;border-radius:10px;padding:12px;text-align:center;margin-bottom:12px;">
                <div style="font-size:12px;color:#64748b;">Gesch&auml;tzter Preis</div>
                <div style="font-size:28px;font-weight:800;color:#059669;" id="anf-price">&mdash;</div>
                <div style="font-size:12px;color:#64748b;" id="anf-route-info"></div>
            </div>
            <div style="display:flex;gap:8px;">
                <button onclick="sendAnfrageWhatsApp()" style="flex:1;padding:14px;background:#25D366;color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;">💬 WhatsApp</button>
                <button onclick="sendAnfrageEmail()" style="flex:1;padding:14px;background:#3b82f6;color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;">✉️ Email</button>
            </div>
            <div style="text-align:center;margin-top:8px;font-size:12px;color:#94a3b8;">
                oder anrufen: <a href="tel:03837822022" style="color:#059669;font-weight:600;">038378 22022</a>
            </div>
        </div>
    </div>

<script>
(async function loadGoogleMaps() {
    var script = document.createElement('script');
    script.src = 'https://maps.googleapis.com/maps/api/js?key=AIzaSyCEL-wtoIrVm0-PXpILLabGQXfuFaA17lg&libraries=places&language=de&v=weekly';
    script.async = true;
    document.head.appendChild(script);
})();

var anfPax = 1, anfPickupCoords = null, anfDestCoords = null;
var _anfPlacesReady = false, _anfSuggestion = null, _anfToken = null, _anfPlace = null;

(function() {
    var now = new Date();
    var d = document.getElementById('anf-date');
    var t = document.getElementById('anf-time');
    if (d) { d.value = now.toISOString().split('T')[0]; d.min = d.value; }
    if (t) { var hh = String(now.getHours()).padStart(2,'0'); var mm = String(Math.ceil(now.getMinutes()/5)*5).padStart(2,'0'); t.value = hh+':'+mm; }
})();

function setAnfPax(n) {
    anfPax = n;
    document.querySelectorAll('.anf-pax').forEach(function(b,i) {
        b.style.borderColor = (i+1)===n ? '#059669' : '#e2e8f0';
        b.style.background = (i+1)===n ? '#ecfdf5' : 'white';
        b.style.color = (i+1)===n ? '#059669' : '#1e293b';
        b.style.fontWeight = (i+1)===n ? '700' : '400';
    });
    calcAnfPrice();
}

window.addEventListener('load', async function() {
    try {
        var lib = await google.maps.importLibrary('places');
        _anfSuggestion = lib.AutocompleteSuggestion;
        _anfToken = lib.AutocompleteSessionToken;
        _anfPlace = lib.Place;
        _anfPlacesReady = true;
    } catch(e) {}
});

var _anfDebounce = {};
['anf-pickup','anf-dest'].forEach(function(id) {
    var input = document.getElementById(id);
    if (!input) return;
    input.addEventListener('input', function() {
        clearTimeout(_anfDebounce[id]);
        _anfDebounce[id] = setTimeout(function() { anfSearch(input.value, id); }, 300);
    });
});

document.addEventListener('click', function(e) {
    if (!e.target.closest('#anf-pickup-dropdown') && !e.target.closest('#anf-pickup')) document.getElementById('anf-pickup-dropdown').style.display='none';
    if (!e.target.closest('#anf-dest-dropdown') && !e.target.closest('#anf-dest')) document.getElementById('anf-dest-dropdown').style.display='none';
});

async function anfSearch(query, inputId) {
    var dd = document.getElementById(inputId + '-dropdown');
    if (!query || query.length < 2 || !_anfPlacesReady) { dd.style.display='none'; return; }
    try {
        var token = new _anfToken();
        var resp = await _anfSuggestion.fetchAutocompleteSuggestions({
            input: query, locationBias: { center: {lat:53.95,lng:14.10}, radius:25000 },
            language:'de', region:'de', sessionToken: token
        });
        var suggestions = resp.suggestions || [];
        if (!suggestions.length) { dd.style.display='none'; return; }
        dd.innerHTML = suggestions.map(function(s) {
            var p = s.placePrediction;
            var main = p?.mainText?.text || '?';
            var sec = p?.secondaryText?.text || '';
            return '<div style="padding:10px 12px;cursor:pointer;border-bottom:1px solid #f1f5f9;font-size:14px;" onmouseover="this.style.background=\'#ecfdf5\'" onmouseout="this.style.background=\'white\'" onclick="anfSelect(\'' + inputId + '\',\'' + p.placeId + '\',\'' + main.replace(/'/g,"\\'") + '\',\'' + sec.replace(/'/g,"\\'") + '\')"><div style="font-weight:600;">' + main + '</div><div style="font-size:12px;color:#64748b;">' + sec + '</div></div>';
        }).join('');
        dd.style.display='block';
    } catch(e) { dd.style.display='none'; }
}

async function anfSelect(inputId, placeId, mainText, secText) {
    document.getElementById(inputId).value = mainText + (secText ? ', ' + secText : '');
    document.getElementById(inputId + '-dropdown').style.display='none';
    if (_anfPlace && placeId) {
        try {
            var place = new _anfPlace({id:placeId});
            await place.fetchFields({fields:['location','formattedAddress']});
            var lat = place.location?.lat();
            var lng = place.location?.lng();
            if (inputId === 'anf-pickup') anfPickupCoords = {lat:lat,lon:lng};
            else anfDestCoords = {lat:lat,lon:lng};
            document.getElementById(inputId).value = place.formattedAddress || mainText;
            calcAnfPrice();
        } catch(e) {}
    }
}

async function calcAnfPrice() {
    if (!anfPickupCoords || !anfDestCoords) return;
    try {
        var resp = await fetch('https://router.project-osrm.org/route/v1/driving/' + anfPickupCoords.lon + ',' + anfPickupCoords.lat + ';' + anfDestCoords.lon + ',' + anfDestCoords.lat + '?overview=false');
        var data = await resp.json();
        if (!data.routes || !data.routes[0]) return;
        var km = data.routes[0].distance / 1000;
        var min = Math.ceil(data.routes[0].duration / 60);
        var anfTime = document.getElementById('anf-time').value || '';
        var anfDate = document.getElementById('anf-date').value || '';
        var h = new Date().getHours();
        var dayOfWeek = new Date().getDay();
        if (anfTime) h = parseInt(anfTime.split(':')[0]);
        if (anfDate) dayOfWeek = new Date(anfDate + 'T00:00:00').getDay();
        var isSunday = dayOfWeek === 0;
        var isNightTime = h >= 22 || h < 6;
        var isNight = isNightTime || isSunday;
        var price = isNight ? 5.50 : 4.00;
        var remaining = km;
        if (remaining > 0) { var s = Math.min(remaining,2); price += s * 3.30; remaining -= s; }
        if (remaining > 0) { var s2 = Math.min(remaining,2); price += s2 * 2.80; remaining -= s2; }
        if (remaining > 0) { price += remaining * (isNight ? 2.40 : 2.20); }
        if (anfPax >= 5) price += 10;
        price = Math.round(price / 0.1) * 0.1;
        document.getElementById('anf-price').textContent = price.toFixed(2) + '\u20ac';
        var tarifLabel = isSunday && !isNightTime ? 'Sonn-/Feiertagstarif' : isNightTime ? 'Nachttarif' : '';
        document.getElementById('anf-route-info').textContent = km.toFixed(1) + ' km \u00b7 ~' + min + ' Min' + (tarifLabel ? ' \u00b7 ' + tarifLabel : '');
        document.getElementById('anf-price-box').style.display = 'block';
    } catch(e) {}
}

function getAnfrageText() {
    var pickup = document.getElementById('anf-pickup').value || '?';
    var dest = document.getElementById('anf-dest').value || '?';
    var date = document.getElementById('anf-date').value || '?';
    var time = document.getElementById('anf-time').value || '?';
    var name = document.getElementById('anf-name').value || '?';
    var phone = document.getElementById('anf-phone').value || '?';
    var price = document.getElementById('anf-price').textContent || '?';
    return 'Taxi-Anfrage:\n\ud83d\udccd Von: ' + pickup + '\n\ud83c\udfaf Nach: ' + dest + '\n\ud83d\udcc5 ' + date + ' um ' + time + ' Uhr\n\ud83d\udc65 ' + anfPax + ' Person(en)\n\ud83d\udc64 ' + name + '\n\ud83d\udcf1 ' + phone + '\n\ud83d\udcb0 ca. ' + price;
}

// Anfrage in Firebase speichern (Tracking)
function saveAnfrageToFirebase(channel) {
    try {
        var data = {
            pickup: document.getElementById('anf-pickup').value || '',
            destination: document.getElementById('anf-dest').value || '',
            date: document.getElementById('anf-date').value || '',
            time: document.getElementById('anf-time').value || '',
            passengers: anfPax,
            name: document.getElementById('anf-name').value || '',
            phone: document.getElementById('anf-phone').value || '',
            price: document.getElementById('anf-price').textContent || '',
            channel: channel,
            type: 'taxi',
            status: 'offen',
            createdAt: Date.now()
        };
        fetch('https://taxi-heringsdorf-default-rtdb.firebaseio.com/anfragen.json', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        }).catch(function() {});
    } catch(e) {}
}

function sendAnfrageWhatsApp() {
    if (!document.getElementById('anf-pickup').value) { alert('Bitte Abholort eingeben'); return; }
    if (!document.getElementById('anf-name').value.trim()) { alert('Bitte Name eingeben'); return; }
    if (!document.getElementById('anf-phone').value.trim()) { alert('Bitte Telefonnummer eingeben'); return; }
    saveAnfrageToFirebase('whatsapp');
    window.open('https://wa.me/4915127585179?text=' + encodeURIComponent(getAnfrageText()), '_blank');
}

function sendAnfrageEmail() {
    if (!document.getElementById('anf-pickup').value) { alert('Bitte Abholort eingeben'); return; }
    if (!document.getElementById('anf-name').value.trim()) { alert('Bitte Name eingeben'); return; }
    if (!document.getElementById('anf-phone').value.trim()) { alert('Bitte Telefonnummer eingeben'); return; }
    saveAnfrageToFirebase('email');
    var subject = encodeURIComponent('Taxi-Anfrage von ' + (document.getElementById('anf-name').value || 'Kunde'));
    window.location.href = 'mailto:taxiwydra@googlemail.com?subject=' + subject + '&body=' + encodeURIComponent(getAnfrageText());
}
</script>
</body>
</html>
