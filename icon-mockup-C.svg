    <circle cx="0" cy="-8" r="14" fill="#1a9a37"/>

    <!-- Kleines Taxi IM Pin -->
    <g transform="translate(0, -8) scale(0.55)">
      <rect x="-14" y="0" width="28" height="9" rx="2" fill="url(#bodyC)" stroke="#a06a00" stroke-width="0.6"/>
