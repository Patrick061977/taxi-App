name: Android APK bauen

on:
  workflow_dispatch:
  push:
    branches: ['main']
    paths:
      - 'android/**'
      - 'package.json'
      - 'capacitor.config.json'
      - '.github/workflows/build-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Versions-Info aus build.gradle lesen
        id: version
        run: |
          VNAME=$(grep -oP 'versionName "\K[^"]+' android/app/build.gradle | head -1)
          VCODE=$(grep -oP 'versionCode \K[0-9]+' android/app/build.gradle | head -1)
          echo "versionName=$VNAME" >> $GITHUB_OUTPUT
          echo "versionCode=$VCODE" >> $GITHUB_OUTPUT
          echo "🏷️ Baue Version $VNAME (Code $VCODE)"

      - name: Node.js 22 installieren
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: JDK 21 installieren
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: NPM Dependencies installieren
        run: |
          set -x
          node --version
          npm --version
          npm install --no-audit --no-fund
          echo "--- node_modules/.bin ---"
          ls node_modules/.bin/cap* 2>&1 || echo "cap binary missing"
          echo "--- @capacitor ---"
          ls node_modules/@capacitor/ 2>&1 || echo "@capacitor missing"

      - name: www/ Platzhalter anlegen (App lädt Remote-URL)
        run: |
          set -x
          mkdir -p www
          cat > www/index.html <<'EOF'
          <!DOCTYPE html>
          <html><head><meta charset="utf-8"><title>Taxi Heringsdorf</title></head>
          <body><script>location.href="https://taxi-heringsdorf.web.app"</script></body></html>
          EOF
          ls -la www/

      - name: Capacitor sync (Android)
        run: |
          set -x
          cat capacitor.config.json
          npx cap sync android 2>&1 || {
            echo "===== CAP SYNC FAILED ====="
            echo "--- android/ contents ---"
            ls -la android/
            echo "--- capacitor-cordova plugins? ---"
            ls -la android/capacitor-cordova-android-plugins/ 2>&1 || echo "folder missing"
            exit 1
          }

      - name: Keystore aus Secret dekodieren
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          ls -la android/app/release.keystore

      - name: APK signieren + bauen
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: APK umbenennen
        id: rename
        run: |
          SRC=android/app/build/outputs/apk/release/app-release.apk
          if [ ! -f "$SRC" ]; then
            SRC=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          fi
          DEST=taxi-app-v${{ steps.version.outputs.versionName }}.apk
          cp "$SRC" "$DEST"
          SIZE=$(du -h "$DEST" | cut -f1)
          echo "apkPath=$DEST" >> $GITHUB_OUTPUT
          echo "apkSize=$SIZE" >> $GITHUB_OUTPUT
          echo "## 📱 APK fertig" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.versionName }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Code:** ${{ steps.version.outputs.versionCode }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Datei:** \`$DEST\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Größe:** $SIZE" >> $GITHUB_STEP_SUMMARY

      - name: APK als Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: taxi-app-v${{ steps.version.outputs.versionName }}
          path: ${{ steps.rename.outputs.apkPath }}
          retention-days: 90

      - name: GitHub Release erstellen
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.versionName }}
          name: Taxi App v${{ steps.version.outputs.versionName }}
          body: |
            ## 📱 Taxi Heringsdorf – Fahrer App

            - **Version:** ${{ steps.version.outputs.versionName }}
            - **versionCode:** ${{ steps.version.outputs.versionCode }}
            - **Größe:** ${{ steps.rename.outputs.apkSize }}

            ### 📥 Installation
            1. APK unten herunterladen
            2. Auf dem Handy öffnen (Unbekannte Quellen erlauben falls nötig)
            3. Fertig – App startet automatisch die aktuelle Web-Version von taxi-heringsdorf.web.app

            ℹ️ Der "Update verfügbar"-Banner in der App verlinkt automatisch auf diese Release-Seite.
          files: ${{ steps.rename.outputs.apkPath }}
          fail_on_unmatched_files: true
          make_latest: true

      # v6.60.4: APK + latest.json auf Strato mirrorn — Patrick: S20-Download von GitHub
      # extrem langsam, manche Samsung-ROMs drosseln + GitHub-CDN für DE-User suboptimal.
      # Strato (DE-Hosting) liefert direkt + zügig. App prüft latest.json zuerst, GitHub-Fallback.
      # v6.60.5: Strato Root-.htaccess leitet umwelt-taxi-insel-usedom.de/<*> auf /Taxi-App/<*> um.
      # Dateien in /app/ direkt sind nicht erreichbar → wir müssen nach /Taxi-App/app/ uploaden.
      # Öffentlich erreichbar bleiben sie aber unter umwelt-taxi-insel-usedom.de/app/* via Rewrite.
      - name: Strato-Mirror vorbereiten
        if: github.ref == 'refs/heads/main'
        id: strato-mirror
        run: |
          set -e
          mkdir -p strato-apk-upload/Taxi-App/app
          cp "${{ steps.rename.outputs.apkPath }}" strato-apk-upload/Taxi-App/app/taxi-app-latest.apk
          SHA256=$(sha256sum strato-apk-upload/Taxi-App/app/taxi-app-latest.apk | cut -d' ' -f1)
          SIZE=$(stat -c%s strato-apk-upload/Taxi-App/app/taxi-app-latest.apk)
          BUILD_TS=$(TZ="Europe/Berlin" date +"%Y-%m-%dT%H:%M:%S%:z")
          cat > strato-apk-upload/Taxi-App/app/latest.json <<EOF
          {
            "tag_name": "v${{ steps.version.outputs.versionName }}",
            "version": "${{ steps.version.outputs.versionName }}",
            "versionCode": ${{ steps.version.outputs.versionCode }},
            "browser_download_url": "https://umwelt-taxi-insel-usedom.de/app/taxi-app-latest.apk",
            "sha256": "$SHA256",
            "size": $SIZE,
            "buildTime": "$BUILD_TS"
          }
          EOF
          echo "✅ Strato-Mirror vorbereitet (SHA256: $SHA256, Size: $SIZE)"
          ls -la strato-apk-upload/Taxi-App/app/

      - name: Strato-Secrets prüfen
        if: github.ref == 'refs/heads/main'
        id: check-strato-secrets
        run: |
          if [ -n "${{ secrets.STRATO_FTP_HOST }}" ] \
             && [ "${{ secrets.STRATO_FTP_HOST }}" != "PLACEHOLDER_UPDATE_ME" ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "⏭️ Strato-Secrets fehlen — Mirror-Upload übersprungen"
          fi

      - name: APK auf Strato mirrorn (FTP)
        if: github.ref == 'refs/heads/main' && steps.check-strato-secrets.outputs.ready == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.STRATO_FTP_HOST }}
          username: ${{ secrets.STRATO_FTP_USER }}
          password: ${{ secrets.STRATO_FTP_PASSWORD }}
          local-dir: ./strato-apk-upload/
          server-dir: /
          dangerous-clean-slate: false
          state-name: .ftp-deploy-apk-sync-state.json
          log-level: minimal
