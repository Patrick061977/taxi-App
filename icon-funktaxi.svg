<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#2bbf48"/>
      <stop offset="100%" stop-color="#22a83e"/>
    </linearGradient>
    <linearGradient id="taxiBody" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFE043"/>
      <stop offset="100%" stop-color="#F5C400"/>
    </linearGradient>
  </defs>

  <!-- Hintergrund -->
  <rect width="192" height="192" rx="34" fill="url(#bg)"/>

  <!-- Schriftzug FUNK TAXI oben (FUNK weiß, TAXI gelb) -->
  <text x="96" y="32" font-size="22" font-family="Arial Black, Impact, sans-serif" font-weight="900" text-anchor="middle" letter-spacing="0.6">
    <tspan fill="#fff">FUNK</tspan><tspan fill="#FFD600">TAXI</tspan>
  </text>

  <!-- Standort-Pin (gelb, klassisch) -->
  <g transform="translate(96, 60)">
    <path d="M 0 -16 C -10 -16 -18 -8 -18 2 C -18 10 -10 16 0 28 C 10 16 18 10 18 2 C 18 -8 10 -16 0 -16 Z"
          fill="#FFD600" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="0" cy="-1" r="6" fill="#fff"/>
  </g>

  <!-- Funkwellen links (zwei Bögen) -->
  <g fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round">
    <path d="M 28 78 Q 18 96 28 114"/>
    <path d="M 14 70 Q 0 96 14 122"/>
  </g>

  <!-- Funkwellen rechts -->
  <g fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round">
    <path d="M 164 78 Q 174 96 164 114"/>
    <path d="M 178 70 Q 192 96 178 122"/>
  </g>

  <!-- TAXI-AUTO frontal — wie im Vorbild -->
  <g transform="translate(96, 110)">
    <!-- Schatten -->
    <ellipse cx="0" cy="38" rx="48" ry="3" fill="#000" opacity="0.2"/>

    <!-- Dach (gerundet, mit TAXI-Schriftzug direkt drauf) -->
    <path d="M -32 -22 Q -30 -32 -22 -32 L 22 -32 Q 30 -32 32 -22 L 32 -16 L -32 -16 Z"
          fill="url(#taxiBody)" stroke="#1a1a1a" stroke-width="2"/>
    <text x="0" y="-21" font-size="11" font-family="Arial Black, Arial, sans-serif" font-weight="900" text-anchor="middle" fill="#1a1a1a" letter-spacing="0.6">TAXI</text>

    <!-- Windschutzscheibe (dunkel, breites Trapez) -->
    <path d="M -30 -16 L -24 -3 L 24 -3 L 30 -16 Z" fill="#1f2937" stroke="#1a1a1a" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Mittelpfosten -->
    <line x1="0" y1="-16" x2="0" y2="-3" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Reflexion -->
    <path d="M -22 -13 L -10 -5 L -16 -5 Z" fill="#fff" opacity="0.18"/>

    <!-- Hauptkarosserie (mit Kotflügel-Bögen) -->
    <path d="M -42 -3 L 42 -3 L 42 12 Q 40 18 32 18 Q 32 26 22 26 L -22 26 Q -32 26 -32 18 Q -40 18 -42 12 Z"
          fill="url(#taxiBody)" stroke="#1a1a1a" stroke-width="2"/>

    <!-- Kotflügel-Schatten -->
    <path d="M -42 12 Q -40 18 -32 18 L -32 12 Z" fill="#1a1a1a" opacity="0.15"/>
    <path d="M 42 12 Q 40 18 32 18 L 32 12 Z" fill="#1a1a1a" opacity="0.15"/>

    <!-- Scheinwerfer links + rechts -->
    <ellipse cx="-30" cy="2" rx="7" ry="5.5" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
    <ellipse cx="30" cy="2" rx="7" ry="5.5" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>

    <!-- Kühlergrill -->
    <rect x="-13" y="6" width="26" height="9" rx="2" fill="#1a1a1a"/>

    <!-- Räder seitlich -->
    <ellipse cx="-30" cy="22" rx="8" ry="5" fill="#1a1a1a"/>
    <ellipse cx="-30" cy="22" rx="3.5" ry="2.5" fill="#3a3a3a"/>
    <ellipse cx="30" cy="22" rx="8" ry="5" fill="#1a1a1a"/>
    <ellipse cx="30" cy="22" rx="3.5" ry="2.5" fill="#3a3a3a"/>
  </g>

  <!-- LIVE Schriftzug unten -->
  <text x="96" y="178" font-size="22" font-family="Arial Black, Impact, sans-serif" font-weight="900" text-anchor="middle" fill="#fff" letter-spacing="3.5">LIVE</text>
</svg>
