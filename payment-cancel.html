<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Zahlung abgebrochen — Funk Taxi Heringsdorf</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #1e293b;
        }
        .card {
            background: white;
            border-radius: 20px;
            max-width: 440px;
            width: 100%;
            padding: 40px 28px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .icon { font-size: 72px; margin-bottom: 12px; }
        h1 { color: #b45309; font-size: 24px; font-weight: 800; margin-bottom: 8px; }
        p { color: #475569; font-size: 15px; line-height: 1.5; margin-bottom: 20px; }
        .invoice-ref {
            background: #fef3c7;
            border: 1px solid #fcd34d;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 22px;
            font-size: 14px;
        }
        .invoice-ref-label { font-size: 11px; color: #92400e; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 4px; }
        .invoice-ref-value { font-family: monospace; color: #1e293b; word-break: break-all; }
        .btn {
            display: block;
            padding: 14px 20px;
            background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 10px;
        }
        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
            font-weight: 600;
        }
        .footer { margin-top: 20px; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">⚠️</div>
        <h1>Zahlung abgebrochen</h1>
        <p>Die Zahlung wurde nicht abgeschlossen. Kein Geld wurde abgebucht.<br><br>Möchten Sie es nochmal versuchen? Dann schließen Sie dieses Fenster und klicken erneut auf Ihren Bezahllink.</p>
        <div class="invoice-ref" id="invoice-ref" style="display:none;">
            <div class="invoice-ref-label">Rechnungsnummer</div>
            <div class="invoice-ref-value" id="invoice-ref-value">–</div>
        </div>
        <a href="tel:03837822022" class="btn">📞 Hilfe: 038378 / 22022</a>
        <a href="landing.html" class="btn btn-secondary">🏠 Zur Startseite</a>
        <div class="footer">Funk Taxi Heringsdorf</div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const invoice = params.get('invoice');
        if (invoice) {
            document.getElementById('invoice-ref-value').textContent = invoice;
            document.getElementById('invoice-ref').style.display = 'block';
        }
    </script>
</body>
</html>
