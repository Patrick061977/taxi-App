name: Deploy Telegram Bot (Cloud Functions)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch deployen (z.B. main oder claude/fix-telegram-bot-PHIk3)'
        required: false
        default: 'main'

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - name: Service Account pruefen
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ]; then
            echo "FEHLER: FIREBASE_SERVICE_ACCOUNT Secret fehlt!"
            echo "Bitte unter Settings > Secrets > Actions hinzufuegen."
            echo "Anleitung: Firebase Console > Project Settings > Service Accounts > Neuen privaten Schluessel generieren"
            exit 1
          fi
          echo "Service Account vorhanden - weiter..."

      - name: Google Auth einrichten
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Code herunterladen
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'main' }}

      - name: Node.js 20 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Firebase Tools installieren
        run: npm install -g firebase-tools

      - name: Pakete installieren (functions/)
        run: cd functions && npm install

      - name: Bot deployen
        run: firebase deploy --only functions --force --project taxi-heringsdorf


      - name: Webhook aktivieren
        if: success()
        run: |
          echo "=== Bot erfolgreich deployed! ==="
          RESPONSE=$(curl -s "https://europe-west1-taxi-heringsdorf.cloudfunctions.net/setupWebhook")
          echo "Webhook-Antwort: $RESPONSE"
