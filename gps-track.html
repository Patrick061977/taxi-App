<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📍 GPS-Diagnose — Funk Taxi Heringsdorf</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#f1f5f9}
  #header{background:#1e293b;padding:12px 16px;border-bottom:1px solid #334155;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
  #header h1{font-size:16px;flex:1;min-width:200px}
  select,button{background:#334155;color:#f1f5f9;border:1px solid #475569;padding:6px 10px;border-radius:6px;font-size:13px;cursor:pointer}
  button:hover{background:#475569}
  #map{width:100%;height:55vh;background:#0f172a}
  #stats{padding:12px 16px;display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;background:#1e293b;border-bottom:1px solid #334155}
  .stat{background:#334155;padding:8px 12px;border-radius:6px}
  .stat-label{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:0.5px}
  .stat-value{font-size:18px;font-weight:700;margin-top:2px}
  .stat-value.ok{color:#10b981}
  .stat-value.warn{color:#f59e0b}
  .stat-value.bad{color:#ef4444}
  #timeline{padding:8px 16px;max-height:30vh;overflow-y:auto;font-size:12px;font-family:ui-monospace,monospace}
  .hb-row{display:grid;grid-template-columns:60px 60px 1fr 80px;gap:8px;padding:3px 6px;border-bottom:1px solid #1e293b;align-items:center}
  .hb-row:hover{background:#1e293b}
  .hb-time{color:#cbd5e1}
  .hb-gap{font-weight:700}
  .hb-gap.ok{color:#10b981}
  .hb-gap.warn{color:#f59e0b}
  .hb-gap.bad{color:#ef4444}
  .hb-coords{color:#94a3b8;font-size:11px}
  .hb-flag{font-size:11px;text-align:right}
  .legend{position:absolute;bottom:8px;left:8px;background:rgba(15,23,42,0.92);padding:8px 12px;border-radius:6px;font-size:11px;z-index:500;border:1px solid #334155}
  .legend-row{display:flex;align-items:center;gap:6px;margin:2px 0}
  .legend-dot{width:12px;height:12px;border-radius:50%;border:2px solid #fff}
</style>
</head>
<body>
<div id="header">
  <h1>📍 GPS-Diagnose</h1>
  <select id="vehicle-select"></select>
  <select id="source-select">
    <option value="live">Live (letzte 30 Min)</option>
    <option value="shift">Schicht-Verlauf (komplett)</option>
  </select>
  <select id="shift-select" style="display:none"></select>
  <button id="refresh-btn">🔄 Neu laden</button>
  <button id="auto-refresh-btn">⏸️ Auto-Refresh</button>
</div>
<div id="stats"></div>
<div style="position:relative">
  <div id="map"></div>
  <div class="legend">
    <div class="legend-row"><span class="legend-dot" style="background:#10b981"></span>Heartbeat sauber (&lt;35s)</div>
    <div class="legend-row"><span class="legend-dot" style="background:#f59e0b"></span>Verzögert (35–60s)</div>
    <div class="legend-row"><span class="legend-dot" style="background:#ef4444"></span>Lücke (&gt;60s)</div>
    <div class="legend-row"><span class="legend-dot" style="background:#0ea5e9;border-color:#0ea5e9"></span>Aktuelle Position</div>
  </div>
</div>
<div id="timeline"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyD2eHFuplImxBCijd3MWlKyCwXUZHLmhhE",
  authDomain: "taxi-heringsdorf.firebaseapp.com",
  databaseURL: "https://taxi-heringsdorf-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "taxi-heringsdorf",
  storageBucket: "taxi-heringsdorf.firebasestorage.app",
  messagingSenderId: "889033864088",
  appId: "1:889033864088:web:3c78db4cfefb1c35e4e31c"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const HERINGSDORF = [53.95, 14.16];
const map = L.map('map').setView(HERINGSDORF, 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(map);

let routePolyline = null;
let trackMarkers = [];
let currentMarker = null;
let autoRefreshHandle = null;

function fmtTime(ts) {
  return new Date(ts).toLocaleTimeString('de-DE', { timeZone: 'Europe/Berlin' });
}

function gapClass(gapSec) {
  if (gapSec < 35) return 'ok';
  if (gapSec < 60) return 'warn';
  return 'bad';
}
function gapColor(gapSec) {
  if (gapSec < 35) return '#10b981';
  if (gapSec < 60) return '#f59e0b';
  return '#ef4444';
}

async function loadVehicles() {
  const snap = await db.ref('vehicles').once('value');
  const v = snap.val() || {};
  const sel = document.getElementById('vehicle-select');
  sel.innerHTML = '';
  Object.entries(v).filter(([id, data]) => data.lat || data.shift).forEach(([id, data]) => {
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = (data.name || id) + (data.shift?.status === 'active' ? ' 🟢' : '');
    sel.appendChild(opt);
  });
  // Default: ?vehicleId=... oder erstes
  const params = new URLSearchParams(location.search);
  const want = params.get('vehicleId') || params.get('vid');
  if (want && v[want]) sel.value = want;
}

async function loadShifts(vehicleId) {
  const sel = document.getElementById('shift-select');
  sel.innerHTML = '<option value="">Lade...</option>';
  const snap = await db.ref('shiftHistory/' + vehicleId).once('value');
  const shifts = snap.val() || {};
  const ids = Object.keys(shifts).sort((a,b) => Number(b) - Number(a));
  if (ids.length === 0) {
    sel.innerHTML = '<option value="">Keine Schichten</option>';
    return;
  }
  sel.innerHTML = '';
  ids.forEach(id => {
    const s = shifts[id];
    const start = new Date(Number(id));
    const dStr = start.toLocaleString('de-DE', { timeZone: 'Europe/Berlin', day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
    const status = s.status === 'auto-ended' ? ' (auto-end)' : (s.endTime ? ' (beendet)' : ' 🟢');
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = dStr + status;
    sel.appendChild(opt);
  });
}

async function render(vehicleId) {
  // Clear bestehende Layer
  if (routePolyline) { map.removeLayer(routePolyline); routePolyline = null; }
  trackMarkers.forEach(m => map.removeLayer(m));
  trackMarkers = [];
  if (currentMarker) { map.removeLayer(currentMarker); currentMarker = null; }

  const source = document.getElementById('source-select').value;
  let entries = [];
  if (source === 'shift') {
    const shiftId = document.getElementById('shift-select').value;
    if (!shiftId) {
      document.getElementById('stats').innerHTML = '<div class="stat"><div class="stat-label">Hinweis</div><div class="stat-value warn">Keine Schicht ausgewaehlt</div></div>';
      return;
    }
    const snap = await db.ref('shiftHistory/' + vehicleId + '/' + shiftId + '/heartbeats').once('value');
    const data = snap.val() || {};
    entries = Object.values(data).filter(e => e && e.ts).sort((a,b) => a.ts - b.ts);
  } else {
    const histSnap = await db.ref('gpsHealth/' + vehicleId + '/history').once('value');
    const data = histSnap.val() || {};
    entries = Object.values(data).filter(e => e && e.ts).sort((a,b) => a.ts - b.ts);
  }

  if (entries.length === 0) {
    document.getElementById('stats').innerHTML = '<div class="stat"><div class="stat-label">Hinweis</div><div class="stat-value bad">Keine Daten</div></div>';
    document.getElementById('timeline').innerHTML = '<div style="padding:20px;text-align:center;color:#94a3b8">Noch keine Heartbeats fuer dieses Fahrzeug. Schicht starten + warten.</div>';
    return;
  }

  // Stats
  const gaps = [];
  for (let i = 1; i < entries.length; i++) gaps.push((entries[i].ts - entries[i-1].ts) / 1000);
  const avgGap = gaps.length ? gaps.reduce((a,b) => a+b, 0) / gaps.length : 0;
  const maxGap = gaps.length ? Math.max(...gaps) : 0;
  const longGaps = gaps.filter(g => g > 60).length;
  // hasGps fallback: shiftHistory schreibt nur lat/lon — als gpsOk werten wenn beide gesetzt
  const isGpsOk = e => e.hasGps === true || (e.lat && e.lon);
  const withGps = entries.filter(isGpsOk).length;

  // Distanz
  let totalKm = 0;
  const gpsEntries = entries.filter(e => isGpsOk(e) && e.lat && e.lon);
  for (let i = 1; i < gpsEntries.length; i++) {
    const x = gpsEntries[i-1], y = gpsEntries[i];
    const dl = (x.lat - y.lat) * Math.PI/180;
    const dn = (x.lon - y.lon) * Math.PI/180;
    const a = Math.sin(dl/2)**2 + Math.cos(x.lat*Math.PI/180)*Math.cos(y.lat*Math.PI/180)*Math.sin(dn/2)**2;
    totalKm += 6371 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  const last = entries[entries.length-1];
  const ageSec = (Date.now() - last.ts) / 1000;
  const wakeLock = last.powerStatus?.wakeLock;
  const batOpt = last.powerStatus?.batteryOpt;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">Heartbeats</div><div class="stat-value ok">${entries.length}</div></div>
    <div class="stat"><div class="stat-label">Mittel-Intervall</div><div class="stat-value ${avgGap < 35 ? 'ok' : 'warn'}">${avgGap.toFixed(1)}s</div></div>
    <div class="stat"><div class="stat-label">Max-Lücke</div><div class="stat-value ${maxGap < 60 ? 'ok' : maxGap < 120 ? 'warn' : 'bad'}">${maxGap.toFixed(1)}s</div></div>
    <div class="stat"><div class="stat-label">Lücken &gt;60s</div><div class="stat-value ${longGaps === 0 ? 'ok' : 'bad'}">${longGaps}</div></div>
    <div class="stat"><div class="stat-label">GPS-Coverage</div><div class="stat-value ${withGps === entries.length ? 'ok' : 'warn'}">${withGps}/${entries.length}</div></div>
    <div class="stat"><div class="stat-label">Track-Länge</div><div class="stat-value">${totalKm.toFixed(2)} km</div></div>
    <div class="stat"><div class="stat-label">WakeLock</div><div class="stat-value ${wakeLock === undefined ? '' : (wakeLock ? 'ok' : 'bad')}">${wakeLock === undefined ? 'n/a' : (wakeLock ? '✓ aktiv' : '✗ aus')}</div></div>
    <div class="stat"><div class="stat-label">Battery-Opt</div><div class="stat-value ${batOpt === undefined ? '' : (batOpt ? 'ok' : 'warn')}">${batOpt === undefined ? 'n/a' : (batOpt ? '✓ ignoriert' : '⚠ aktiv')}</div></div>
    <div class="stat"><div class="stat-label">Letzter Tick</div><div class="stat-value ${ageSec < 60 ? 'ok' : ageSec < 180 ? 'warn' : 'bad'}">vor ${ageSec.toFixed(0)}s</div></div>
  `;

  // Polyline der Route
  if (gpsEntries.length > 1) {
    const latlngs = gpsEntries.map(e => [e.lat, e.lon]);
    routePolyline = L.polyline(latlngs, { color: '#0ea5e9', weight: 3, opacity: 0.7 }).addTo(map);
    map.fitBounds(routePolyline.getBounds(), { padding: [40, 40] });
  }

  // Marker pro Heartbeat — Farbe nach Gap-Klasse zum NÄCHSTEN
  entries.forEach((e, i) => {
    if (!isGpsOk(e) || !e.lat || !e.lon) return;
    const nextGap = i < entries.length - 1 ? (entries[i+1].ts - e.ts) / 1000 : 0;
    const color = gapColor(nextGap || 30);
    const m = L.circleMarker([e.lat, e.lon], { radius: 4, color, fillColor: color, fillOpacity: 0.85, weight: 1 }).addTo(map);
    m.bindPopup(`<b>${fmtTime(e.ts)}</b><br>Lat: ${e.lat.toFixed(5)}<br>Lon: ${e.lon.toFixed(5)}<br>Genauigkeit: ${e.acc ? e.acc.toFixed(0) + 'm' : '?'}<br>Lücke davor: ${i>0 ? ((e.ts - entries[i-1].ts)/1000).toFixed(1) + 's' : '–'}`);
    trackMarkers.push(m);
  });

  // Aktuelle Position als großer Marker
  if (gpsEntries.length > 0) {
    const cur = gpsEntries[gpsEntries.length - 1];
    currentMarker = L.circleMarker([cur.lat, cur.lon], { radius: 10, color: '#0ea5e9', fillColor: '#0ea5e9', fillOpacity: 1, weight: 3 }).addTo(map);
    currentMarker.bindPopup(`<b>📍 Aktuell</b><br>${fmtTime(cur.ts)}`);
  }

  // Timeline-Liste (neueste oben)
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';
  for (let i = entries.length - 1; i >= 0; i--) {
    const e = entries[i];
    const gap = i > 0 ? (entries[i].ts - entries[i-1].ts) / 1000 : null;
    const cls = gap !== null ? gapClass(gap) : 'ok';
    const flag = isGpsOk(e) ? '' : '<span style="color:#ef4444">kein GPS</span>';
    tl.innerHTML += `<div class="hb-row">
      <span class="hb-time">${fmtTime(e.ts)}</span>
      <span class="hb-gap ${cls}">${gap !== null ? gap.toFixed(1) + 's' : 'start'}</span>
      <span class="hb-coords">${e.lat ? e.lat.toFixed(4) + ', ' + e.lon.toFixed(4) : '–'} ${e.acc ? '(±' + e.acc.toFixed(0) + 'm)' : ''}</span>
      <span class="hb-flag">${flag}</span>
    </div>`;
  }

  // v6.62.87: Audit-Trail — Fahrten der Schicht + Lifecycle-Events laden
  const isShiftMode = document.getElementById('source-select').value === 'shift';
  if (isShiftMode && entries.length > 0) {
    loadShiftRides(vehicleId, entries[0].ts, entries[entries.length-1].ts, gpsEntries).catch(_ => {});
  }
}

// v6.62.87: Lade alle Rides die zur Schicht gehoeren + zeige Lifecycle als Section + Marker
async function loadShiftRides(vehicleId, shiftStart, shiftEnd, gpsEntries) {
  const tl = document.getElementById('timeline');
  // Lade alle Rides dieses Fahrzeugs im Schicht-Zeitfenster
  const ridesSnap = await db.ref('rides').orderByChild('vehicleId').equalTo(vehicleId).once('value');
  const rides = [];
  ridesSnap.forEach(c => {
    const r = c.val();
    if (!r) return;
    const refTs = r.acceptedAt || r.assignedAt || r.createdAt || r.pickupTimestamp || 0;
    if (refTs < shiftStart - 30*60000 || refTs > shiftEnd + 30*60000) return;
    rides.push({ id: c.key, ...r });
  });
  rides.sort((a, b) => (a.acceptedAt || a.createdAt || 0) - (b.acceptedAt || b.createdAt || 0));
  if (rides.length === 0) {
    tl.insertAdjacentHTML('afterbegin', '<div style="padding:8px;color:#94a3b8;background:#1e293b;border-radius:6px;margin-bottom:8px;font-size:12px;">📋 Keine Fahrten in dieser Schicht.</div>');
    return;
  }
  // Header
  let html = `<div style="padding:10px;background:#1e293b;border-radius:8px;margin-bottom:8px;border:1px solid #334155;">
    <div style="font-weight:700;font-size:14px;color:#f1f5f9;margin-bottom:8px;">🚖 Fahrten in dieser Schicht (${rides.length})</div>`;
  for (const r of rides) {
    // v6.63.080 Phase 2: liest /rideLogs/{id} statt /rides/{id}/lifecycleLog
    const lcSnap = await db.ref('rideLogs/' + r.id).once('value');
    const events = [];
    lcSnap.forEach(c => { const v = c.val(); if (v && v.t) events.push(v); });
    events.sort((a, b) => a.t - b.t);
    const customer = r.customerName || r.guestName || '?';
    const pickup = (r.pickup || '').slice(0, 40);
    const dest = (r.destination || '').slice(0, 40);
    const ptStr = r.pickupTimestamp ? new Date(r.pickupTimestamp).toLocaleString('de-DE',{ timeZone:'Europe/Berlin', day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' }) : '?';
    const status = r.status || '?';
    const wartezeit = (r.arrivedAt && r.pickedUpAt) ? Math.round((r.pickedUpAt - r.arrivedAt) / 1000) : null;
    html += `<details style="margin:6px 0;background:#0f172a;border:1px solid #334155;border-radius:6px;">
      <summary style="cursor:pointer;padding:6px 10px;font-weight:600;color:#cbd5e1;font-size:12px;">
        ${ptStr} · ${customer} · ${status} <span style="color:#64748b;">(${events.length} Events)</span>
      </summary>
      <div style="padding:6px 10px;font-size:11px;color:#94a3b8;border-top:1px solid #334155;">
        📍 ${pickup} → ${dest}
        ${wartezeit !== null ? ` · ⏱️ Wartezeit ${wartezeit}s` : ''}
        ${r.drivingTimeToPickup ? ` · 🚗 Anfahrt ${r.drivingTimeToPickup}min` : ''}
      </div>
      <div style="max-height:240px;overflow-y:auto;padding:0 10px 8px;">
        ${events.map(e => {
          const t = new Date(e.t).toLocaleTimeString('de-DE',{ timeZone:'Europe/Berlin', hour:'2-digit', minute:'2-digit', second:'2-digit' });
          let detail = '';
          if (e.details) {
            let d = e.details;
            if (typeof d === 'string') { try { d = JSON.parse(d); } catch(_) {} }
            if (typeof d === 'object' && d) {
              detail = Object.entries(d).slice(0,3).map(([k,v]) => `<span style="color:#64748b;">${k}:</span> ${String(v).slice(0,40)}`).join(' · ');
            } else if (typeof d === 'string') detail = d.slice(0,80);
          }
          return `<div style="padding:3px 0;border-bottom:1px solid #1e293b;">
            <span style="color:#94a3b8;font-family:ui-monospace,monospace;">${t}</span>
            ${e.icon || '•'} <span style="color:#cbd5e1;">${(e.action||'').replace(/[<>]/g,'').slice(0,80)}</span>
            ${detail ? `<div style="font-size:10px;color:#64748b;margin-left:64px;">${detail}</div>` : ''}
          </div>`;
        }).join('')}
      </div>
    </details>`;

    // Marker fuer relevante Events auf der Karte
    const relevantIcons = new Set(['📥','👆','🚗','✅','🏁','📊','📲','⚠️']);
    for (const e of events) {
      if (!relevantIcons.has(e.icon)) continue;
      let nearestHb = null, minDiff = Infinity;
      for (const hb of gpsEntries) {
        const diff = Math.abs(hb.ts - e.t);
        if (diff < minDiff) { minDiff = diff; nearestHb = hb; }
      }
      if (!nearestHb || minDiff > 90000) continue;
      let color = '#3b82f6';
      if (e.icon === '✅' || e.icon === '🚗') color = '#10b981';
      else if (e.icon === '⚠️') color = '#f59e0b';
      else if (e.icon === '🏁') color = '#8b5cf6';
      else if (e.icon === '👆') color = '#06b6d4';
      else if (e.icon === '📥' || e.icon === '📲') color = '#6366f1';
      const m = L.circleMarker([nearestHb.lat, nearestHb.lon], { radius: 7, fillColor: color, color:'#fff', weight: 2, opacity: 1, fillOpacity: 0.9 })
        .bindTooltip(`<b>${e.icon} ${(e.action || '').replace(/[<>]/g,'')}</b><br>${customer} ${ptStr}<br>${new Date(e.t).toLocaleTimeString('de-DE',{timeZone:'Europe/Berlin'})}`, { direction:'top' })
        .addTo(map);
      trackMarkers.push(m);
    }
  }
  html += '</div>';
  tl.insertAdjacentHTML('afterbegin', html);
}

async function init() {
  // Anonym anmelden falls Rules das brauchen
  try { await firebase.auth().signInAnonymously(); } catch (_) {}
  await loadVehicles();
  const sel = document.getElementById('vehicle-select');
  const sourceSel = document.getElementById('source-select');
  const shiftSel = document.getElementById('shift-select');

  async function applyVehicle() {
    if (sourceSel.value === 'shift') {
      shiftSel.style.display = 'inline-block';
      await loadShifts(sel.value);
    } else {
      shiftSel.style.display = 'none';
    }
    render(sel.value);
  }

  sel.addEventListener('change', applyVehicle);
  sourceSel.addEventListener('change', applyVehicle);
  shiftSel.addEventListener('change', () => render(sel.value));
  document.getElementById('refresh-btn').addEventListener('click', () => applyVehicle());
  document.getElementById('auto-refresh-btn').addEventListener('click', () => {
    const btn = document.getElementById('auto-refresh-btn');
    if (autoRefreshHandle) {
      clearInterval(autoRefreshHandle);
      autoRefreshHandle = null;
      btn.textContent = '⏸️ Auto-Refresh';
    } else {
      autoRefreshHandle = setInterval(() => render(sel.value), 30000);
      btn.textContent = '🔴 Auto an (30s)';
    }
  });
  if (sel.value) applyVehicle();
}
init();
</script>
</body>
</html>
