<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bgD" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2bbf48"/>
      <stop offset="100%" stop-color="#147028"/>
    </linearGradient>
  </defs>

  <rect width="192" height="192" rx="34" fill="url(#bgD)"/>

  <!-- Großer Standort-Pin oben mit Funkwellen-Aura -->
  <g transform="translate(96, 60)">
    <!-- Pulse-Wellen um den Pin -->
    <circle cx="0" cy="0" r="56" fill="none" stroke="#fff" stroke-width="2.5" opacity="0.18"/>
    <circle cx="0" cy="0" r="44" fill="none" stroke="#fff" stroke-width="2.5" opacity="0.28"/>
    <circle cx="0" cy="0" r="32" fill="none" stroke="#fff" stroke-width="2.5" opacity="0.45"/>

    <!-- Pin selbst -->
    <path d="M 0 -28 C -14 -28 -24 -18 -24 -4 C -24 8 -14 18 0 38 C 14 18 24 8 24 -4 C 24 -18 14 -28 0 -28 Z"
          fill="#fff" stroke="#0a4a18" stroke-width="1.2"/>
    <!-- Gelbes Taxi-Symbol im Pin -->
    <g transform="translate(0, -7)">
      <rect x="-9" y="0" width="18" height="6" rx="1.4" fill="#FFD600" stroke="#a06a00" stroke-width="0.4"/>
      <path d="M -7 0 L -5 -5 L 5 -5 L 7 0 Z" fill="#FFD600" stroke="#a06a00" stroke-width="0.4"/>
      <rect x="-5" y="-4" width="10" height="3" rx="0.4" fill="#1f2937" opacity="0.8"/>
      <ellipse cx="-7" cy="2.5" rx="1.4" ry="1" fill="#fff"/>
      <ellipse cx="7" cy="2.5" rx="1.4" ry="1" fill="#fff"/>
      <ellipse cx="-9" cy="6" rx="2.5" ry="1.4" fill="#1f1f1f"/>
      <ellipse cx="9" cy="6" rx="2.5" ry="1.4" fill="#1f1f1f"/>
    </g>
  </g>

  <!-- FUNK TAXI Schriftzug — sehr prominent -->
  <text x="96" y="148" font-size="22" font-family="Arial Black, Impact, sans-serif" font-weight="900" text-anchor="middle" fill="#fff" letter-spacing="2.8">FUNK TAXI</text>

  <!-- HERINGSDORF · USEDOM -->
  <text x="96" y="170" font-size="10.5" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle" fill="#fff" letter-spacing="1.8" opacity="0.95">HERINGSDORF · USEDOM</text>

  <!-- Telefonnummer dezent -->
  <text x="96" y="184" font-size="7" font-family="Arial, sans-serif" font-weight="600" text-anchor="middle" fill="#fff" letter-spacing="0.5" opacity="0.7">038378 / 22 022</text>
</svg>
